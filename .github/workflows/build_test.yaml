on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - .github/workflows/*.yaml
  pull_request:
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'Version to build'
        required: false
        type: string

env:
  VERSION: ${{ inputs.VERSION }}

jobs:
  docker-build:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-24.04-arm
            docker_arch: arm64v8
          # - runs_on: ubuntu-24.04
          #   docker_arch: amd64
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Set repository name
      if: vars.DOCKERHUB_TEST_REGISTRY
      run:
        echo "REGISTRY=${{ vars.DOCKERHUB_TEST_REGISTRY }}" >> $GITHUB_ENV;
        if [[ -n "${{ github.event.pull_request.number }}" ]]; then
          echo "TAG=github-pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV;
        else
          echo "TAG=ref-${{ github.ref_name }}" >> $GITHUB_ENV;
        fi
    - name: Compile for ${{matrix.docker_arch}}
      run:
        docker build -f dockerfiles/Dockerfile.build -t build_env --target build_env .
    - name: Copy debs
      run:
        docker run --rm -v "$PWD":/dest build_env cp -rv /src/release /dest
    - name: Create release image for ${{matrix.docker_arch}}
      run:
        docker build -f dockerfiles/Dockerfile.release -t "${{ env.REGISTRY }}:${{ env.TAG }}-${{ matrix.docker_arch }}" --target build_env .

    # Push to DockerHub
    - name: Login to Docker Hub
      if: vars.DOCKERHUB_TEST_REGISTRY
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_TEST_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TEST_TOKEN }}
    - name: Run dockerhub for ${{matrix.docker_arch}}
      if: vars.DOCKERHUB_TEST_REGISTRY
      run:
        docker push "${{ env.REGISTRY }}:${{ env.TAG }}-${{ matrix.docker_arch }}"

  manifest:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Set repository name
      if: vars.DOCKERHUB_TEST_REGISTRY
      run:
        echo "REGISTRY=${{ vars.DOCKERHUB_TEST_REGISTRY }}" >> $GITHUB_ENV;
        if [[ -n "${{ github.event.pull_request.number }}" ]]; then
          echo "TAG=github-pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV;
        else
          echo "TAG=ref-${{ github.ref_name }}" >> $GITHUB_ENV;
        fi
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Create manifest
      run:
        docker manifest create "${{ env.REGISTRY }}:${{ env.TAG }}" \
          "${{ env.REGISTRY }}:${{ env.TAG }}-"{arm64v8} \
        docker manifest push "${{ env.REGISTRY }}:${{ env.TAG }}"
